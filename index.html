<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a73e8">
  <meta name="description" content="神经科ISBAR交班助手 - 纯前端离线PWA应用">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="智交班">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon-192.svg">
  <link rel="apple-touch-icon" href="./icon-192.svg">
  <title>智交班 - 神经科ISBAR交班助手</title>
  <link rel="stylesheet" href="./style.css">
  <!-- Tesseract.js OCR 引擎（本地离线识别） -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
</head>
<body>
  <!-- ==================== 顶部导航栏 ==================== -->
  <header class="navbar">
    <div class="navbar-brand">
      <svg class="logo-icon" viewBox="0 0 32 32" width="28" height="28">
        <circle cx="16" cy="16" r="14" fill="#1a73e8" stroke="#fff" stroke-width="2"/>
        <text x="16" y="22" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">+</text>
      </svg>
      <h1 class="app-title">智交班</h1>
      <span class="app-subtitle">神经科ISBAR交班助手</span>
    </div>
    <div class="navbar-actions">
      <button id="btnInstall" class="btn btn-outline btn-sm" title="安装到桌面" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        安装应用
      </button>
      <button id="btnHistory" class="btn btn-outline btn-sm" title="历史记录">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        历史记录
      </button>
      <button id="btnClear" class="btn btn-outline btn-sm btn-danger" title="清空所有数据">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        清空数据
      </button>
    </div>
  </header>

  <!-- ==================== 主体区域 ==================== -->
  <main class="main-container">
    <!-- 左侧：上传识别区 -->
    <section class="panel panel-upload" id="uploadPanel">
      <h2 class="panel-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        上传识别区
      </h2>

      <!-- 上传按钮组 -->
      <div class="upload-buttons">
        <button id="btnUpload" class="btn btn-primary btn-block">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          选择图片文件
        </button>
        <button id="btnCamera" class="btn btn-secondary btn-block">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          摄像头拍照
        </button>
        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">
      </div>

      <!-- 图片预览区 -->
      <div class="preview-area" id="previewArea">
        <div class="preview-placeholder" id="previewPlaceholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>请上传病历截图或拍照</p>
        </div>
        <img id="imgPreview" src="" alt="预览" style="display:none;">
        <div class="preview-toolbar" id="previewToolbar" style="display:none;">
          <label class="brightness-label">
            亮度：
            <input type="range" id="brightnessSlider" min="0" max="200" value="100" class="brightness-slider">
            <span id="brightnessValue">100%</span>
          </label>
          <button id="btnRemoveImage" class="btn btn-sm btn-outline">移除图片</button>
        </div>
      </div>

      <!-- OCR 操作区 -->
      <div class="ocr-actions">
        <button id="btnOCR" class="btn btn-accent btn-block" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          开始识别文字
        </button>
        <div class="ocr-status" id="ocrStatus"></div>
      </div>

      <!-- 原始识别文本 -->
      <div class="ocr-result">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          原始识别文本（可编辑修改）：
        </label>
        <textarea id="ocrText" class="text-area" rows="6" placeholder="OCR识别结果将显示在此处..."></textarea>
        <button id="btnClassify" class="btn btn-primary btn-block" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 17"/><polyline points="20 17 14 11 20 17"/><line x1="14" y1="7" x2="20" y2="17"/><line x1="10" y1="7" x2="4" y2="17"/></svg>
          自动分类到ISBAR
        </button>
      </div>
    </section>

    <!-- 右侧：ISBAR编辑区 -->
    <section class="panel panel-isbar" id="isbarPanel">
      <h2 class="panel-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        ISBAR 交班编辑区
      </h2>

      <!-- I - Identification 身份确认 -->
      <div class="isbar-card card-i">
        <div class="card-header">
          <span class="card-badge badge-i">I</span>
          <h3>身份确认 <small>Identification</small></h3>
        </div>
        <textarea id="isbarI" class="text-area" rows="3" placeholder="床号、姓名、性别、年龄、入院诊断&#10;示例：床号：3床，姓名：张XX，性别：女，年龄：68岁，入院诊断：急性缺血性脑卒中（右侧基底节区）"></textarea>
      </div>

      <!-- S - Situation 患者情况 -->
      <div class="isbar-card card-s">
        <div class="card-header">
          <span class="card-badge badge-s">S</span>
          <h3>患者情况 <small>Situation</small></h3>
        </div>
        <textarea id="isbarS" class="text-area" rows="3" placeholder="入院时间、主诉、入院时情况、病情变化、手术/危重事件、核心症状&#10;示例：患者因'突发左侧肢体无力2小时'入院，入院时神志清楚，双侧瞳孔等大等圆，左侧肢体肌力2级；昨日14:00行支架植入术，术后神志清楚，左侧肢体肌力3级。"></textarea>
      </div>

      <!-- B - Background 背景信息 -->
      <div class="isbar-card card-b">
        <div class="card-header">
          <span class="card-badge badge-b">B</span>
          <h3>背景信息 <small>Background</small></h3>
        </div>
        <textarea id="isbarB" class="text-area" rows="3" placeholder="既往病史、药物过敏史、当前用药、关键检查结果、留置管路、皮肤状态&#10;示例：既往高血压病史10年，口服硝苯地平控制；无药物过敏史；昨日头颅MRI提示右侧基底节区急性梗死；留置右侧肘正中静脉留置针1枚，固定通畅，全身皮肤完整无压红。"></textarea>
      </div>

      <!-- A - Assessment 综合评估 -->
      <div class="isbar-card card-a">
        <div class="card-header">
          <span class="card-badge badge-a">A</span>
          <h3>综合评估 <small>Assessment</small></h3>
        </div>
        <textarea id="isbarA" class="text-area" rows="3" placeholder="生命体征、24h出入量、饮食睡眠、大小便、风险评分、病情判断&#10;示例：患者目前神志清楚，瞳孔等大等圆，对光反射灵敏，左侧肢体肌力3级；生命体征平稳，血压125-135/75-85mmHg；24小时入量1800ml，出量1500ml；压疮风险12分（低危），疼痛评分2分。"></textarea>
      </div>

      <!-- R - Recommendation 护理建议 -->
      <div class="isbar-card card-r">
        <div class="card-header">
          <span class="card-badge badge-r">R</span>
          <h3>护理建议 <small>Recommendation</small></h3>
        </div>
        <textarea id="isbarR" class="text-area" rows="3" placeholder="护理重点、监测事项、待执行治疗、康复指导、会诊跟进、注意事项&#10;示例：1. 持续心电监护，监测血压波动，维持在130/80mmHg左右；2. 今晨空腹采血，追踪肝肾功能结果；3. 左侧肢体康复训练，指导主动运动；4. 追踪神经内科会诊意见，及时调整治疗方案。"></textarea>
      </div>

      <!-- 待归类内容 -->
      <div class="unclassified-area">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          待归类内容（可手动复制到对应板块）：
        </label>
        <textarea id="unclassified" class="text-area text-area-small" rows="3" placeholder="无法自动分类的文字将显示在此处..."></textarea>
      </div>
    </section>
  </main>

  <!-- ==================== 底部操作栏 ==================== -->
  <footer class="action-bar">
    <button id="btnGenerate" class="btn btn-accent btn-lg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      生成交班文稿
    </button>
    <button id="btnExportTXT" class="btn btn-primary btn-lg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      导出TXT
    </button>
    <button id="btnExportDOCX" class="btn btn-secondary btn-lg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      导出Word
    </button>
  </footer>

  <!-- ==================== 弹窗：交班文稿预览 ==================== -->
  <div class="modal-overlay" id="modalPreview" style="display:none;">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2>交班文稿预览</h2>
        <button class="btn-close" id="btnClosePreview">&times;</button>
      </div>
      <div class="modal-body">
        <div class="report-preview" id="reportContent"></div>
      </div>
      <div class="modal-footer">
        <button id="btnCopyReport" class="btn btn-outline">复制到剪贴板</button>
        <button id="btnSaveHistory" class="btn btn-primary">保存到历史记录</button>
        <button id="btnClosePreview2" class="btn btn-outline">关闭</button>
      </div>
    </div>
  </div>

  <!-- ==================== 弹窗：历史记录 ==================== -->
  <div class="modal-overlay" id="modalHistory" style="display:none;">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2>历史交班记录</h2>
        <button class="btn-close" id="btnCloseHistory">&times;</button>
      </div>
      <div class="modal-body">
        <div class="history-list" id="historyList">
          <p class="empty-hint">暂无历史记录</p>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnCloseHistory2" class="btn btn-outline">关闭</button>
      </div>
    </div>
  </div>

  <!-- ==================== 弹窗：摄像头拍照 ==================== -->
  <div class="modal-overlay" id="modalCamera" style="display:none;">
    <div class="modal-content modal-md">
      <div class="modal-header">
        <h2>摄像头拍照</h2>
        <button class="btn-close" id="btnCloseCamera">&times;</button>
      </div>
      <div class="modal-body modal-body-camera">
        <video id="cameraVideo" autoplay playsinline class="camera-video"></video>
        <canvas id="cameraCanvas" style="display:none;"></canvas>
      </div>
      <div class="modal-footer">
        <button id="btnCapture" class="btn btn-accent">拍照</button>
        <button id="btnCloseCamera2" class="btn btn-outline">取消</button>
      </div>
    </div>
  </div>

  <!-- ==================== 弹窗：确认清空 ==================== -->
  <div class="modal-overlay" id="modalConfirm" style="display:none;">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>确认操作</h2>
        <button class="btn-close" id="btnCloseConfirm">&times;</button>
      </div>
      <div class="modal-body">
        <p>确定要清空所有本地数据吗？此操作不可恢复。</p>
      </div>
      <div class="modal-footer">
        <button id="btnConfirmClear" class="btn btn-danger">确认清空</button>
        <button id="btnCloseConfirm2" class="btn btn-outline">取消</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast" style="display:none;"></div>

  <!-- 核心业务逻辑 -->
  <script src="./app.js"></script>
</body>
</html>
